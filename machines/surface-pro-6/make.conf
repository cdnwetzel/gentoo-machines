# /etc/portage/make.conf
# Gentoo Linux - Microsoft Surface Pro 6
# ============================================================================
# CONFIRMED HARDWARE (from 5 rounds of live harvesting + Fedora cross-ref):
#   CPU:     Intel Core i5-8250U @ 1.60GHz (Kaby Lake-R, 4C/8T, turbo 3.40GHz)
#   GPU:     Intel UHD Graphics 620 [8086:5917] (Kaby Lake GT2, i915, DMC v1.4)
#   RAM:     8GB LPDDR3 @ 1867 MT/s (SK Hynix, soldered)
#   NVMe:    SK hynix BC501 238.5GB [1c5c:1327] (TRIM supported)
#   WiFi:    Marvell 88W8897 AVASTAR [11ab:2b38] (mwifiex_pcie, 802.11ac)
#   BT:      Marvell [1286:204c] (btusb, mrvl/usb8897_uapsta.bin)
#   Audio:   Realtek ALC298 (subsystem 0x10ec10cc, snd_hda_intel)
#            + Intel Kabylake HDMI [8086:280b]
#   Panel:   2736x1824 PixelSense (267 PPI, 3:2), backlight via intel_backlight
#   Touch:   IPTS present but NON-FUNCTIONAL on this unit (hardware issue)
#   Input:   Surface Type Cover [045e:09c0] (USB HID, keyboard + touchpad)
#   Sensors: ISH (accel, gyro, ALS, rotation)
#   Thermal: SAM-controlled fan, DPTF thermal zones
#   Battery: Li-ion 45Wh, 84% health @ 160 cycles
#   Suspend: s2idle only (Modern Standby, no S3)
#   EFI:     64-bit UEFI, Secure Boot (must disable for unsigned kernel)
#   Board:   Surface Pro 6 / SAM firmware 241.304.139
# ============================================================================

# ============================================================================
# COMPILER FLAGS - Kaby Lake-R microarchitecture
# ============================================================================
COMMON_FLAGS="-march=skylake -O2 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

# ============================================================================
# PARALLELISM - 4 cores / 8 threads, 8GB RAM
# ============================================================================
MAKEOPTS="-j2 -l3"
EMERGE_DEFAULT_OPTS="--jobs=2 --load-average=8.0 --with-bdeps=y --verbose"

# ============================================================================
# TMPFS FOR PORTAGE - Build in RAM, save the NVMe SSD
# ============================================================================
# Add to /etc/fstab:
#   tmpfs /var/tmp/portage tmpfs size=4G,uid=portage,gid=portage,mode=775,nosuid,noatime,nodev 0 0
#
# Large packages that exceed 4GB use disk fallback via package.env:
#   /etc/portage/env/notmpfs.conf -> PORTAGE_TMPDIR="/var/tmp/portage-disk"
PORTAGE_TMPDIR="/var/tmp/portage"

# ============================================================================
# PORTAGE FEATURES
# ============================================================================
FEATURES="parallel-fetch candy ccache"
CCACHE_DIR="/var/cache/ccache"
CCACHE_SIZE="5G"

# ============================================================================
# USE FLAGS
# ============================================================================
# Core desktop
USE="X wayland egl opengl gles2 vulkan vaapi"

# Audio - Realtek ALC298 + HDMI audio via PipeWire
USE="${USE} alsa pipewire pulseaudio sound-server"

# Networking / Bluetooth
USE="${USE} bluetooth wifi networkmanager"

# Init system - OpenRC + elogind
USE="${USE} elogind -systemd dbus policykit udisks"

# Filesystem support
USE="${USE} fat exfat fuse"

# Compression (zram + portage)
USE="${USE} zstd lz4"

# General
USE="${USE} unicode nls threads ncurses readline"

# Hardware-specific
USE="${USE} acpi laptop"

# Not present on this hardware
USE="${USE} -nvidia -nouveau -amdgpu -radeonsi -thunderbolt"

# ============================================================================
# HARDWARE VARIABLES
# ============================================================================
VIDEO_CARDS="intel"
INPUT_DEVICES="libinput"

# Verified from /proc/cpuinfo flags on Surface Pro 6 (Kaby Lake-R i5-8250U)
# Will re-verify with cpuid2cpuflags after emerge
CPU_FLAGS_X86="aes avx avx2 f16c fma3 mmx mmxext pclmul popcnt rdrand sse sse2 sse3 sse4_1 sse4_2 ssse3"

# ============================================================================
# BOOT
# ============================================================================
GRUB_PLATFORMS="efi-64"
ACCEPT_LICENSE="*"

# ============================================================================
# LOCALE
# ============================================================================
L10N="en en-US"
LC_MESSAGES=C.utf8

# ============================================================================
# MICROCODE
# ============================================================================
# CPU: Family 6, Model 142, Stepping 10 → Signature 0x000806ea
MICROCODE_SIGNATURES="-s 0x000806ea"

# ============================================================================
# MIRRORS
# ============================================================================
GENTOO_MIRRORS="https://gentoo.osuosl.org/ \
    https://mirrors.rit.edu/gentoo/ \
    https://mirror.leaseweb.com/gentoo/"

# ============================================================================
# POST-INSTALL CHECKLIST
# ============================================================================
# 1. emerge sys-kernel/linux-firmware  (mrvl/pcie8897_uapsta.bin, i915/kbl_dmc_ver1_04.bin)
# 2. emerge sys-firmware/intel-microcode (signature 0x000806ea)
# 3. Disable Secure Boot in Surface UEFI (Vol Up + Power to enter)
# 4. Enable fstrim.timer or periodic fstrim (NVMe supports TRIM)
# 5. /etc/fstab tmpfs line for portage (see above)
# 6. Bootloader: GRUB EFI (--bootloader-id=Gentoo)
# 7. cpuid2cpuflags to verify CPU_FLAGS_X86
# 8. No audio model quirk needed (ALC298 autoconfig works per Fedora reference)
# 9. No special kernel boot params needed (Fedora used only "rhgb quiet")
