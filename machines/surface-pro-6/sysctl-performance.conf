# /etc/sysctl.d/99-surface-pro-6-performance.conf
# Tuned for: i5-8250U (4C/8T), 8GB RAM, SK hynix BC501 NVMe

# --- VM / Memory ---
# Low swappiness: prefer RAM over zram (8GB is tight, but zram is fast)
vm.swappiness = 10

# Moderate VFS cache aging (keep dentries/inodes longer)
vm.vfs_cache_pressure = 50

# Larger dirty page window: batch writes for NVMe throughput
vm.dirty_ratio = 40
vm.dirty_background_ratio = 10

# Writeback interval (NVMe is fast, slightly more aggressive)
vm.dirty_writeback_centisecs = 500

# --- Kernel / Scheduler ---
# Desktop responsiveness during emerge builds (critical on 4C/8T with 8GB)
kernel.sched_autogroup_enabled = 1

# Allow unprivileged user namespaces (Chrome sandbox, flatpak)
kernel.unprivileged_userns_clone = 1

# --- Networking ---
# Larger buffers for WiFi throughput (Marvell 88W8897 802.11ac)
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# Fast TCP connection resumption
net.ipv4.tcp_fastopen = 3
