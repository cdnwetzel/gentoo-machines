# /etc/portage/make.conf - Dell XPS 15 9510 Gentoo
# CPU: i7-11800H (Tiger Lake-H, 8C/16T)
# GPU: Intel UHD + NVIDIA RTX 3050 Ti
# RAM: 32GB DDR4
# Storage: 2x Samsung 990 PRO 1TB NVMe

# Compiler flags - Tiger Lake optimized
COMMON_FLAGS="-march=tigerlake -O2 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

# Parallelism - 32GB RAM allows aggressive builds
# 8 cores / 16 threads, plenty of RAM headroom
MAKEOPTS="-j16"
EMERGE_DEFAULT_OPTS="--jobs=4 --load-average=16"

# USE flags
# Intel desktop + NVIDIA compute, Bluetooth enabled
USE="X gtk dbus elogind udisks vaapi gallium dri proprietary-codecs \
     bluetooth python ssl readline sqlite ncurses zlib lzma \
     -systemd -pulseaudio -cups -doc -nls -gnome -kde"

# Video Drivers - Intel primary desktop + NVIDIA for CUDA
VIDEO_CARDS="intel iris nvidia"

# Portage
ACCEPT_LICENSE="*"
ACCEPT_KEYWORDS="amd64"
PORTAGE_TMPDIR="/var/tmp/portage"

# Language/targets
L10N="en"
PYTHON_TARGETS="python3_12 python3_13"
PYTHON_SINGLE_TARGET="python3_13"

# Mirrors
GENTOO_MIRRORS="https://distfiles.gentoo.org"
GRUB_PLATFORMS="efi-64"

# ccache - speeds up Portage rebuilds significantly
# Install: emerge -av dev-util/ccache
# FEATURES="ccache" (uncomment after ccache is installed)
# CCACHE_DIR="/data/build-cache/ccache"
