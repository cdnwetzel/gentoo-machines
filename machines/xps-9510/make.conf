# /etc/portage/make.conf
# Gentoo Linux - Dell XPS 15 9510
# ============================================================================
# CONFIRMED HARDWARE (from live Gentoo system + deep_harvest.sh):
#   CPU:     Intel Core i7-11800H @ 2.30GHz (Tiger Lake-H, 8C/16T, turbo 4.60GHz)
#   GPU:     Intel TigerLake-H GT1 UHD [8086:9a60] (i915, GuC/HuC enabled)
#            NVIDIA GeForce RTX 3050 Ti Mobile [10de:25a0] (GA107M, 4GB GDDR6)
#   RAM:     32GB DDR4-3200 (2x16GB)
#   NVMe 0:  Samsung 990 PRO 1TB [144d:a80c] — Gentoo root
#   NVMe 1:  Samsung 990 PRO 1TB [144d:a80c] — /data
#   WiFi:    Intel Wi-Fi 6 AX203 CNVi [8086:43f0] (iwlwifi, QuZ firmware)
#   BT:      Intel AX201 [8087:0026] (btusb + btintel)
#   Audio:   Tiger Lake-H HD Audio [8086:43c8] (snd_hda_intel, Realtek codec)
#   TB:      Intel Tiger Lake Thunderbolt 4 (dual USB-C + DP Alt Mode)
#   Panel:   3456x2160 OLED (eDP-1), backlight via intel_backlight
#   Camera:  Microdia Integrated_Webcam_HD [0c45:672e] (USB UVC, no IPU6)
#   Input:   PS/2 keyboard + Synaptics touchpad, USB Anker hub peripherals
#   Sensors: Intel ISH [8086:43fc] (accel, gyro, ALS)
#   Thermal: Intel Dynamic Tuning [8086:9a03] + thermald + tlp
#   Card:    Realtek RTS5260 [10ec:5260] (rtsx_pci)
#   Sleep:   S0ix (s2idle) + S3 deep
#   EFI:     64-bit UEFI, Dell BIOS 1.43.0
#   Board:   Dell 0A61 / XPS 15 9510
# ============================================================================

# ============================================================================
# COMPILER FLAGS - Tiger Lake-H microarchitecture (AVX-512)
# ============================================================================
COMMON_FLAGS="-march=tigerlake -O2 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

# ============================================================================
# PARALLELISM - 8 cores / 16 threads, 32GB RAM
# ============================================================================
MAKEOPTS="-j17 -l16"
EMERGE_DEFAULT_OPTS="--jobs=4 --load-average=16.0 --with-bdeps=y --verbose"

# ============================================================================
# TMPFS FOR PORTAGE - Build in RAM, save the Samsung 990 PROs
# ============================================================================
# Add to /etc/fstab:
#   tmpfs /var/tmp/portage tmpfs size=24G,uid=portage,gid=portage,mode=775,nosuid,noatime,nodev 0 0
#
# Large packages that exceed 24GB use disk fallback via package.env:
#   /etc/portage/env/notmpfs.conf -> PORTAGE_TMPDIR="/var/tmp/portage-disk"
PORTAGE_TMPDIR="/var/tmp"

# ============================================================================
# PORTAGE FEATURES
# ============================================================================
FEATURES="parallel-fetch candy ccache"
CCACHE_DIR="/data/build-cache/ccache"
CCACHE_SIZE="10G"

# ============================================================================
# USE FLAGS
# ============================================================================
# Core desktop
USE="X wayland egl opengl gles2 vulkan vaapi"

# Audio - Tiger Lake-H HDA + HDMI audio via PipeWire
USE="${USE} alsa pipewire pulseaudio sound-server"

# Networking / Bluetooth
USE="${USE} bluetooth wifi networkmanager"

# Init system - OpenRC + elogind
USE="${USE} elogind -systemd dbus policykit udisks"

# NVIDIA / CUDA
USE="${USE} nvidia cuda"

# Filesystem support
USE="${USE} fat exfat fuse"

# Compression (zram + portage)
USE="${USE} zstd lz4"

# General
USE="${USE} unicode nls threads ncurses readline"

# Hardware-specific
USE="${USE} thunderbolt acpi laptop"

# Not present on this hardware
USE="${USE} -nouveau -amdgpu -radeonsi"

# ============================================================================
# HARDWARE VARIABLES
# ============================================================================
VIDEO_CARDS="intel iris nvidia"
INPUT_DEVICES="libinput"

# Tiger Lake-H i7-11800H (full AVX-512 support)
# Verified with cpuid2cpuflags on live system
CPU_FLAGS_X86="aes avx avx2 avx512_bitalg avx512_vbmi2 avx512_vnni avx512_vp2intersect avx512_vpopcntdq avx512bw avx512cd avx512dq avx512f avx512ifma avx512vbmi avx512vl bmi1 bmi2 f16c fma3 mmx mmxext pclmul popcnt rdrand sha sse sse2 sse3 sse4_1 sse4_2 ssse3 vpclmulqdq"

# ============================================================================
# BOOT
# ============================================================================
GRUB_PLATFORMS="efi-64"
ACCEPT_LICENSE="*"

# ============================================================================
# LOCALE
# ============================================================================
L10N="en en-US"
LC_MESSAGES=C.utf8

# ============================================================================
# MICROCODE
# ============================================================================
# CPU: Family 6, Model 141, Stepping 1 → Signature 0x000806d1
MICROCODE_SIGNATURES="-s 0x000806d1"

# ============================================================================
# PYTHON
# ============================================================================
PYTHON_TARGETS="python3_12 python3_13"
PYTHON_SINGLE_TARGET="python3_13"

# ============================================================================
# MIRRORS
# ============================================================================
GENTOO_MIRRORS="https://gentoo.osuosl.org/ \
    https://mirrors.rit.edu/gentoo/ \
    https://mirror.leaseweb.com/gentoo/"

# ============================================================================
# POST-INSTALL CHECKLIST
# ============================================================================
# 1. emerge sys-kernel/linux-firmware  (i915/tgl_*, iwlwifi-QuZ-*, intel/ibt-20-*)
# 2. emerge sys-firmware/intel-microcode (signature 0x000806d1)
# 3. emerge x11-drivers/nvidia-drivers  (kernel-open modules tools USE flags)
# 4. Enable fstrim.timer or periodic fstrim (dual NVMe TRIM-capable)
# 5. /etc/fstab tmpfs line for portage (see above)
# 6. mkdir -p /data/build-cache/ccache && chown root:portage && chmod 2775
# 7. Bootloader: GRUB EFI (i915.enable_guc=3, nvidia dynamic power boot params)
# 8. cpuid2cpuflags to verify CPU_FLAGS_X86
# 9. Install 99-module-rebuild.install for automatic nvidia rebuild on kernel update
