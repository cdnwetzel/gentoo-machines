# /etc/sysctl.d/99-xps9510-performance.conf
# Tuned for: i7-11800H (8C/16T), 32GB RAM, dual Samsung 990 PRO NVMe

# --- VM / Memory ---
# Low swappiness: prefer keeping data in RAM (32GB is plenty)
vm.swappiness = 10

# Increase cache pressure slightly for better memory reclaim under ML loads
vm.vfs_cache_pressure = 50

# Larger dirty page window: let NVMe batch writes for throughput
vm.dirty_ratio = 40
vm.dirty_background_ratio = 10

# More aggressive writeback on fast NVMe
vm.dirty_writeback_centisecs = 500

# --- Kernel / Scheduler ---
# Reduce latency for interactive desktop + ML workloads
kernel.sched_autogroup_enabled = 1

# --- Networking ---
# Larger buffers for high-throughput USB Ethernet / WiFi
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# Fast TCP
net.ipv4.tcp_fastopen = 3

# --- ML / CUDA ---
# PyTorch/CUDA large models need more memory mappings
vm.max_map_count = 262144
