# /etc/conf.d/zram-init - XPS 9510 (32GB RAM)
# zram compressed swap: safety net for large ML model loading
# 8GB zstd-compressed zram ≈ 16-24GB effective with ~3:1 ratio

# Number of zram devices
num_devices="1"

# Device 0: compressed swap
type0="swap"
size0="8192"           # 8GB (25% of RAM — good balance)
algo0="zstd"           # Best compression ratio for mixed workloads
priority0="100"        # Higher priority than any disk swap
