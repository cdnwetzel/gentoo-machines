# /etc/tlp.conf - Dell XPS 15 9510
# Strategy: Maximum performance on AC, battery compromise acceptable
# ============================================================================

# ============================================================================
# OPERATION
# ============================================================================
TLP_ENABLE=1
TLP_DEFAULT_MODE=AC

# ============================================================================
# CPU - AC: Max performance / Battery: Power save
# ============================================================================
CPU_SCALING_GOVERNOR_ON_AC=performance
CPU_SCALING_GOVERNOR_ON_BAT=powersave

CPU_ENERGY_PERF_POLICY_ON_AC=performance
CPU_ENERGY_PERF_POLICY_ON_BAT=balance_power

CPU_BOOST_ON_AC=1
CPU_BOOST_ON_BAT=0

CPU_HWP_DYN_BOOST_ON_AC=1
CPU_HWP_DYN_BOOST_ON_BAT=0

# ============================================================================
# PLATFORM (Intel Speed Shift / HWP)
# ============================================================================
PLATFORM_PROFILE_ON_AC=performance
PLATFORM_PROFILE_ON_BAT=low-power

# ============================================================================
# DISK - Dual Samsung 990 PRO NVMe
# ============================================================================
DISK_DEVICES="nvme0n1 nvme1n1"

# APM: 254 = max performance (AC), 128 = balanced (battery)
DISK_APM_LEVEL_ON_AC="254 254"
DISK_APM_LEVEL_ON_BAT="128 128"

# NVMe APST (Autonomous Power State Transition)
AHCI_RUNTIME_PM_ON_AC=on
AHCI_RUNTIME_PM_ON_BAT=auto

# ============================================================================
# WIFI - Intel AX203
# ============================================================================
WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=on

# ============================================================================
# USB AUTOSUSPEND
# ============================================================================
USB_AUTOSUSPEND=1

# Exclude keyboard/mouse from autosuspend
USB_DENYLIST="045e:09c0"

# ============================================================================
# RUNTIME PM
# ============================================================================
RUNTIME_PM_ON_AC=on
RUNTIME_PM_ON_BAT=auto

# ============================================================================
# NVIDIA GPU POWER (RTX 3050 Ti via PRIME/Optimus)
# ============================================================================
# nvidia.NVreg_DynamicPowerManagement=0x02 in GRUB handles GPU runtime PM
# tlp should not interfere with NVIDIA driver power management
RUNTIME_PM_DRIVER_DENYLIST="nvidia"

# ============================================================================
# SOUND
# ============================================================================
SOUND_POWER_SAVE_ON_AC=0
SOUND_POWER_SAVE_ON_BAT=1
SOUND_POWER_SAVE_CONTROLLER=Y
