# /etc/mbpfan.conf
# MacBook Pro 12,1 (Early 2015) - i7-5557U
# ============================================================================
# Confirmed from harvest:
#   Fan:  1 fan ("Right Side"), range 1299-6199 RPM
#   Idle: PCH 52°C, CPU pkg 56°C, battery 31°C
#   applesmc: key=670 fan=1 temp=35 sensors
#
# Key temperature sensors (from applesmc):
#   TC1C / TCXC / TCGC / TCSA = CPU core / die temps
#   TH0A-TH0x = Thunderbolt / PCH area
#   TB0T / TB1T / TB2T = Battery temps
#   TM0P = Memory proximity
#   Ts0P / Ts1P = Palm rest / enclosure surface
# ============================================================================

[general]
# Fan speed in RPM at lowest setting (confirmed min: 1299)
min_fan1_speed = 1300

# Fan speed in RPM at highest setting (confirmed max: 6199)
max_fan1_speed = 6199

# Temperature below which fan runs at minimum (°C)
# Idle temps confirmed at 52-56°C, so we set low threshold above that
low_temp = 55

# Temperature at which fan ramps to maximum (°C)
# These Broadwell chips throttle at 100°C; keep aggressive ceiling
high_temp = 80

# Maximum temperature before emergency full blast (°C)
max_temp = 86

# Polling interval in seconds
polling_interval = 3
