# /etc/portage/make.conf
# Gentoo Linux - MacBook Pro 12,1 (Early 2015)
# ============================================================================
# CONFIRMED HARDWARE (from 3 rounds of live USB harvesting):
#   CPU:     Intel Core i7-5557U @ 3.10GHz (Broadwell, 2C/4T)
#   GPU:     Intel Iris Graphics 6100 (Broadwell GT3, i915, no GuC/HuC)
#   RAM:     16GB
#   SSD:     APPLE SSD SM0256G (Samsung OEM, AHCI, TRIM limit 8 blocks)
#   WiFi:    Broadcom BCM43602 (brcmfmac, 802.11ac, 3x3 MIMO VHT)
#   BT:      Broadcom BCM20703A1 (btusb + btbcm, Apple 20MHz variant)
#   Audio:   Cirrus Logic CS4208 (subsystem 0x106b7b00, Apple variant)
#            + Intel Broadwell HDMI audio
#   Panel:   2560x1600 Retina (eDP-1), backlight via intel_backlight
#   TB:      Intel Falcon Ridge DSL5520 (Thunderbolt 2)
#   Input:   bcm5974 trackpad (Force Touch clickpad), applespi keyboard
#   Thermal: 1 fan (1299-6199 RPM), applesmc with 35 sensors
#   Battery: Li-ion, 82% health @ 304 cycles
#   Sleep:   S3 deep supported and default
#   EFI:     Apple EFI v1.1, 64-bit, no Secure Boot
#   Board:   Mac-E43C1C25D4880AD6 / MacBookPro12,1, BIOS 489.0.0.0.0
# ============================================================================

# ============================================================================
# COMPILER FLAGS - Broadwell microarchitecture
# ============================================================================
COMMON_FLAGS="-march=broadwell -O2 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

# ============================================================================
# PARALLELISM - 2 cores / 4 threads, 16GB RAM
# ============================================================================
MAKEOPTS="-j5 -l4"
EMERGE_DEFAULT_OPTS="--jobs=2 --load-average=4.0 --with-bdeps=y --verbose"

# ============================================================================
# TMPFS FOR PORTAGE - Build in RAM, save the Samsung SSD
# ============================================================================
# Add to /etc/fstab:
#   tmpfs /var/tmp/portage tmpfs size=12G,uid=portage,gid=portage,mode=775,nosuid,noatime,nodev 0 0
#
# Large packages that exceed 12GB use disk fallback via package.env:
#   /etc/portage/env/notmpfs.conf -> PORTAGE_TMPDIR="/var/tmp/portage-disk"
PORTAGE_TMPDIR="/var/tmp"

# ============================================================================
# PORTAGE FEATURES
# ============================================================================
FEATURES="parallel-fetch candy ccache"
CCACHE_DIR="/var/cache/ccache"
CCACHE_SIZE="5G"

# ============================================================================
# USE FLAGS
# ============================================================================
# Core desktop
USE="X wayland egl opengl gles2 vulkan vaapi"

# Audio - CS4208 (Cirrus Logic Apple) + HDMI audio
USE="${USE} alsa pipewire pulseaudio sound-server"

# Networking / Bluetooth
USE="${USE} bluetooth wifi networkmanager iwd"

# Init system - OpenRC + elogind
USE="${USE} elogind -systemd dbus policykit udisks"

# Filesystem support
USE="${USE} fat exfat fuse"

# Compression (zram + portage)
USE="${USE} zstd lz4"

# General
USE="${USE} unicode nls threads ncurses readline"

# Hardware-specific
USE="${USE} thunderbolt acpi laptop"

# Not present on this hardware
USE="${USE} -nvidia -nouveau -amdgpu -radeonsi"

# ============================================================================
# HARDWARE VARIABLES
# ============================================================================
VIDEO_CARDS="intel"
INPUT_DEVICES="libinput"

# Verified from harvested /proc/cpuinfo flags
CPU_FLAGS_X86="aes avx avx2 f16c fma3 mmx mmxext pclmul popcnt rdrand sse sse2 sse3 sse4_1 sse4_2 ssse3"

# ============================================================================
# BOOT
# ============================================================================
GRUB_PLATFORMS="efi-64"
ACCEPT_LICENSE="*"

# ============================================================================
# LOCALE
# ============================================================================
L10N="en en-US"
LC_MESSAGES=C.utf8

# ============================================================================
# MICROCODE
# ============================================================================
MICROCODE_SIGNATURES="-s 0x000306d4"

# ============================================================================
# MIRRORS
# ============================================================================
GENTOO_MIRRORS="https://gentoo.osuosl.org/ \
    https://mirrors.rit.edu/gentoo/ \
    https://mirror.leaseweb.com/gentoo/"

# ============================================================================
# POST-INSTALL CHECKLIST
# ============================================================================
# 1. emerge sys-kernel/linux-firmware  (brcmfmac43602-pcie.bin confirmed working)
# 2. emerge sys-firmware/intel-microcode
# 3. emerge app-laptop/mbpfan          (fan: 1299-6199 RPM, critical for compiles)
# 4. bash wifi_firmware_fix.sh         (fix 4 missing Apple-specific blobs)
# 5. Enable fstrim.timer (NOT discard in fstab - SSD TRIM limit is 8 blocks)
# 6. /etc/fstab tmpfs line for portage (see above)
# 7. Bootloader: rEFInd recommended (only macOS Boot0080 exists in EFI)
# 8. cpuid2cpuflags to verify CPU_FLAGS_X86
# 9. Consider thermal paste replacement (304 cycles, 10 years old)
