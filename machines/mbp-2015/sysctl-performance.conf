# /etc/sysctl.d/99-mbp2015-performance.conf
# Tuned for: i7-5557U (2C/4T), 16GB RAM, Apple SM0256G SATA SSD

# --- VM / Memory ---
# Low swappiness: prefer RAM over zram (16GB is plenty)
vm.swappiness = 10

# Moderate VFS cache aging (keep dentries/inodes longer)
vm.vfs_cache_pressure = 50

# Larger dirty page window: batch writes for SATA SSD throughput
vm.dirty_ratio = 40
vm.dirty_background_ratio = 10

# Writeback interval (SATA is slower than NVMe, slightly less aggressive)
vm.dirty_writeback_centisecs = 1000

# --- Kernel / Scheduler ---
# Desktop responsiveness during emerge builds (critical on 2C/4T)
kernel.sched_autogroup_enabled = 1

# Allow unprivileged user namespaces (Chrome sandbox, flatpak)
kernel.unprivileged_userns_clone = 1

# --- Networking ---
# Larger buffers for WiFi throughput (BCM43602 802.11ac)
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# Fast TCP connection resumption
net.ipv4.tcp_fastopen = 3
