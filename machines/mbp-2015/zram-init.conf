# /etc/conf.d/zram-init - MacBook Pro 12,1 (16GB RAM)
# 4GB zstd compressed swap

load_on_start=no       # zram is built-in (CONFIG_ZRAM=y), no module to load
unload_on_stop=no      # can't unload built-in module

# Number of zram devices
num_devices="1"

# Device 0: compressed swap
type0="swap"
size0="4096"           # 4GB (25% of RAM)
algo0="zstd"           # Best compression ratio
labl0="zram_swap"
