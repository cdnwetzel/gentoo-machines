# /etc/modprobe.d/hid-apple.conf
# MacBook Pro 12,1 keyboard mapping
#
# fnmode: 0=disabled, 1=fn pressed by default (Mac), 2=F1-F12 by default (PC)
# swap_opt_cmd: swap Option (Alt) and Command (Super) for standard PC layout
#   Without swap: Command=Alt, Option=Super (confusing on Linux)
#   With swap:    Command=Super, Option=Alt (matches PC keyboards)
options hid_apple fnmode=2
options hid_apple swap_opt_cmd=1
