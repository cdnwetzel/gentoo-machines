# /etc/modprobe.d/hid-apple.conf
# MacBook Pro 12,1 keyboard mapping
#
# fnmode: 0=disabled, 1=fn pressed by default (Mac), 2=F1-F12 by default (PC)
# swap_opt_cmd: 0=no swap (Command=Super, Option=Alt), 1=swap (Command=Alt, Option=Super)
#   No swap is correct for Mac keyboards: Command (⌘) naturally maps to Super,
#   so Super+Arrow tiling, Super+Space search etc. use the Command key.
options hid_apple fnmode=2
options hid_apple swap_opt_cmd=0
