# /etc/lightdm/lightdm-gtk-greeter.conf
# MacBook Pro 12,1 HiDPI greeter configuration
# Install to: /etc/lightdm/lightdm-gtk-greeter.conf

[greeter]
# Large font for 2560x1600 HiDPI display (150% scale)
font-name = Sans 16
# DPI to match xserver-command=X -dpi 144 in lightdm.conf
xft-dpi = 144
xft-antialias = true
xft-hintstyle = hintslight
xft-rgba = rgb
