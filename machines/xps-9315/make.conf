# /etc/portage/make.conf
# Gentoo Linux - Dell XPS 13 9315
# ============================================================================
# WARNING: Best-effort update, not verified on live system (returned to Windows)
#
# CONFIRMED HARDWARE (from live Gentoo + harvest.sh):
#   CPU:     Intel Core i5-1230U @ 1.00GHz (Alder Lake, 2P+8E/12T, turbo 4.40GHz)
#   GPU:     Intel Alder Lake-UP4 GT2 Iris Xe [8086:46aa] (i915)
#   RAM:     8GB LPDDR5 (soldered)
#   NVMe:    Phison PS5019-E19 PCIe4 256GB [1987:5019]
#   WiFi:    Intel Wi-Fi 6E AX211 160MHz CNVi [8086:51f0] (iwlwifi, so firmware)
#   BT:      Intel AX211 [8087:0033] (btusb + btintel)
#   Audio:   Alder Lake Smart Sound [8086:51cc] (sof-audio-pci-intel-tgl, SoundWire)
#   Camera:  Intel IPU6 ISP [8086:465d] + OV01A10 sensor + Visual Sensing Controller
#   TB:      Intel Alder Lake Thunderbolt 4 (dual USB-C + DP Alt Mode)
#   Input:   HID-over-I2C touchpad [0488:102D], Dell keyboard
#   Sensors: Intel ISH [8086:51fc]
#   Thermal: Intel HFI (Hardware Feedback Interface) for hybrid core scheduling
#   Sleep:   s2idle (Modern Standby)
#   EFI:     64-bit UEFI, Dell BIOS 1.35.0
#   Board:   Dell 0WWXF6 (A02) / XPS 13 9315
# ============================================================================

# ============================================================================
# COMPILER FLAGS - Alder Lake microarchitecture (hybrid P-Core/E-Core)
# ============================================================================
COMMON_FLAGS="-march=alderlake -O2 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

# ============================================================================
# PARALLELISM - 2P+8E cores / 12 threads, 8GB RAM
# ============================================================================
MAKEOPTS="-j13 -l12"
EMERGE_DEFAULT_OPTS="--jobs=2 --load-average=12.0 --with-bdeps=y --verbose"

# ============================================================================
# TMPFS FOR PORTAGE - Build in RAM, save the Phison NVMe
# ============================================================================
# Add to /etc/fstab:
#   tmpfs /var/tmp/portage tmpfs size=4G,uid=portage,gid=portage,mode=775,nosuid,noatime,nodev 0 0
#
# Large packages that exceed 4GB use disk fallback via package.env:
#   /etc/portage/env/notmpfs.conf -> PORTAGE_TMPDIR="/var/tmp/portage-disk"
PORTAGE_TMPDIR="/var/tmp/portage"

# ============================================================================
# PORTAGE FEATURES
# ============================================================================
FEATURES="parallel-fetch candy ccache"
CCACHE_DIR="/var/cache/ccache"
CCACHE_SIZE="5G"

# ============================================================================
# USE FLAGS
# ============================================================================
# Core desktop
USE="X wayland egl opengl gles2 vulkan vaapi"

# Audio - SOF (Sound Open Firmware) via PipeWire
USE="${USE} alsa pipewire pulseaudio sound-server"

# Networking / Bluetooth
USE="${USE} bluetooth wifi networkmanager"

# Init system - OpenRC + elogind
USE="${USE} elogind -systemd dbus policykit udisks"

# Filesystem support
USE="${USE} fat exfat fuse"

# Compression (zram + portage)
USE="${USE} zstd lz4"

# General
USE="${USE} unicode nls threads ncurses readline"

# Hardware-specific
USE="${USE} thunderbolt acpi laptop"

# Not present on this hardware
USE="${USE} -nvidia -nouveau -amdgpu -radeonsi"

# ============================================================================
# HARDWARE VARIABLES
# ============================================================================
VIDEO_CARDS="intel iris"
INPUT_DEVICES="libinput"

# Alder Lake i5-1230U (no AVX-512 on consumer Alder Lake, has AVX-VNNI)
# WARNING: Not verified with cpuid2cpuflags — derived from CPU specs
CPU_FLAGS_X86="aes avx avx2 f16c fma3 mmx mmxext pclmul popcnt rdrand sha sse sse2 sse3 sse4_1 sse4_2 ssse3"

# ============================================================================
# BOOT
# ============================================================================
GRUB_PLATFORMS="efi-64"
ACCEPT_LICENSE="*"

# ============================================================================
# LOCALE
# ============================================================================
L10N="en en-US"
LC_MESSAGES=C.utf8

# ============================================================================
# MICROCODE
# ============================================================================
# CPU: Family 6, Model 154, Stepping 4 → Signature 0x000906a4
MICROCODE_SIGNATURES="-s 0x000906a4"

# ============================================================================
# PYTHON
# ============================================================================
PYTHON_TARGETS="python3_12 python3_13"
PYTHON_SINGLE_TARGET="python3_13"

# ============================================================================
# MIRRORS
# ============================================================================
GENTOO_MIRRORS="https://gentoo.osuosl.org/ \
    https://mirrors.rit.edu/gentoo/ \
    https://mirror.leaseweb.com/gentoo/"

# ============================================================================
# POST-INSTALL CHECKLIST
# ============================================================================
# 1. emerge sys-kernel/linux-firmware  (i915/adlp_*, iwlwifi-so-*, intel/ibt-0040-*)
# 2. emerge sys-firmware/intel-microcode (signature 0x000906a4)
# 3. Enable fstrim.timer or periodic fstrim (NVMe supports TRIM)
# 4. /etc/fstab tmpfs line for portage (see above)
# 5. Bootloader: GRUB EFI
# 6. cpuid2cpuflags to verify CPU_FLAGS_X86 (unverified — run on live system!)
# 7. Firmware embedding: XPS 9315 originally embedded firmware in kernel
#    Consider switching to module-based loading (like all other machines)
