# /etc/sysctl.d/99-xps9315-performance.conf
# WARNING: Not verified on live system
# Tuned for: i5-1230U (2P+8E/12T), 8GB RAM, Phison NVMe

# --- VM / Memory ---
# Higher swappiness for 8GB — lean more on zram
vm.swappiness = 30

# Conservative dirty ratios for low RAM
vm.dirty_ratio = 20
vm.dirty_background_ratio = 5

# Keep filesystem caches
vm.vfs_cache_pressure = 50

# Reasonable writeback on NVMe
vm.dirty_writeback_centisecs = 500

# --- Kernel / Scheduler ---
kernel.sched_autogroup_enabled = 1

# Allow unprivileged user namespaces (Chrome sandbox)
kernel.unprivileged_userns_clone = 1

# --- Networking ---
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

net.ipv4.tcp_fastopen = 3
