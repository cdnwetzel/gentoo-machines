# Compiler flags - Tiger Lake optimized (AVX-512 capable)
COMMON_FLAGS="-march=tigerlake -O2 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

# Dynamic parallelism based on available cores and RAM
# nproc = thread count, load-average caps total system load
MAKEOPTS="-j$(nproc)"
EMERGE_DEFAULT_OPTS="--jobs=2 --load-average=$(nproc)"

# USE flags
USE="X gtk dbus elogind udisks vaapi gallium dri proprietary-codecs \
     python ssl readline sqlite ncurses zlib lzma \
     -systemd -pulseaudio -bluetooth -cups -doc -nls -gnome -kde"

# Video Drivers
VIDEO_CARDS="intel iris"

# Portage
ACCEPT_LICENSE="*"
ACCEPT_KEYWORDS="amd64"
PORTAGE_TMPDIR="/var/tmp"

# Language/targets
L10N="en"
PYTHON_TARGETS="python3_12 python3_13"
PYTHON_SINGLE_TARGET="python3_12"

# Mirrors
GENTOO_MIRRORS="https://distfiles.gentoo.org"
GRUB_PLATFORMS="efi-64"
